services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    environment:
      - LOCAL_MODE=${LOCAL_MODE}
      - FILE_PATH=${FILE_PATH}
      - CONFIG_URL=${CONFIG_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SERVER_NAME=${SERVER_NAME}
      - URL=${URL}
      - PORT=${PORT}
      - SUB_NAME=${SUB_NAME}
    volumes:
      - ${FILE_PATH}:/app/configs.txt
      - ${CERT_PATH}/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ${CERT_PATH}/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

networks:
  default:
    driver: bridge
